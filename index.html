<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/c8e4d183c2.js"
      crossorigin="anonymous"
    ></script>
    <title>Blinker entertainment</title>
  </head>

  <body class="container">
  <div class="flex flex-col" id="">
  <header id="app">
      <nav class="navbar align-center justify-between">
        <figure>
          <img src="./assets/blinker-logo.png" class="logo" alt="logo" />
        </figure>
        <ul class="nav__link--list">
          <li class="nav__link">
            <a
              href="#container-wrapper"
              class="nav__link--anchor link__hover-effect link__hover-effect--black"
              >Home</a
            >
          </li>
          <li class="nav__link">
            <a
              href="find-movies.html"
              class="nav__link--anchor link__hover-effect link__hover-effect--black"
              target="_blank">Find your movie</a
            >
          </li>
          <li class="nav__link">
            <a
              href="mailto:email@email.com"
              class="nav__link--anchor nav__link--anchor-primary"
              >CONTACT</a
            >
          </li>
        </ul>
      </nav>
  </header>
  
  <section class="container-wrapper" id="container-wrapper">
      <div class="flex flex-1">
        <div class="about-me__info row">
          <div class="about-me__info--container">
            <h1 class="about-me__info--title">
              <span class="text--purple">Usa's most awarded Movie subscription platform</span>
            </h1>
            <p class="about-me__info--para">
              <h2 class="about-me__info--subtitle">Find your dream movie with <span class="text--purple">Blinker</span></h2>
            </p>
      </div>
        </div>
      </div>

      <div class="flex flex-1">
      <div class="input-wrapper row">
      <input type="text" class="input-wrapper__input" placeholder="Search by Mo, Make a keyword" />
        <button class="not-loading">
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="spinner" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="svg-inline--fa fa-spinner fa-w-16">
        <path fill="currentColor" d="M304 48c0 26.51-21.49 48-48 48s-48-21.49-48-48 21.49-48 48-48 48 21.49 48 48zm-48 368c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.49-48-48-48zm208-208c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.49-48-48-48zM96 256c0-26.51-21.49-48-48-48S0 229.49 0 256s21.49 48 48 48 48-21.49 48-48zm12.922 99.078c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48c0-26.509-21.491-48-48-48zm294.156 0c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48c0-26.509-21.49-48-48-48zM108.922 60.922c-26.51 0-48 21.49-48 48s21.49 48 48 48 48-21.49 48-48-21.491-48-48-48z" class="">
        </path>
        </svg>
      </button>
      </div>
      </div>

      <div class="flex img-wrapper">
      <img src="./assets/building.png" class="building" alt="landing page image" />
      </div>
  </section>
</div>

  </body>
</html>

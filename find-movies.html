<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./find-movie.css">
    <title>Find your movie</title>
</head>

<body class="container">
<div class="top-container__wrapper">
  <div class="flex flex-col" id="top-container">
  <header id="app">
      <nav class="navbar">
        <figure>
          <a href="index.html"><img src="./assets/blinker-logo.png" class="logo" alt="logo" /></a>
        </figure>
        <ul class="nav__link--list">
          <li class="nav__link">
            <a
              href="index.html"
              class="nav__link--anchor link__hover-effect link__hover-effect--black"
              >Home</a
            >
          </li>
          <li class="nav__link">
            <a
              href="#movie-container"
              class="nav__link--anchor link__hover-effect link__hover-effect--black"
              target="_blank">Find your movie</a
            >
          </li>
          <li class="nav__link">
            <a
              href="mailto:email@email.com"
              class="nav__link--anchor nav__link--anchor-primary"
              >CONTACT</a
            >
          </li>
        </ul>
      </nav>
  </header>
  </div>

  <section class="container-wrapper" id="container-wrapper">
      <div class="flex flex-1">
        <div class="about-me__info row">
          <div class="about-me__info--container">
            <h1 class="about-me__info--title">
              <span class="text--purple">Browse our movies</span>
            </h1>
          </div>
        </div>
      </div>

    <div class="flex flex-1">
      <div class="input-wrapper row">
        <input type="text" class="search-input" placeholder="Search by Movie Title, Make a keyword" />
        <button id="search-submit" type="button" class="search-wrapper flex justify-center align-center not-loading">
          <svg
            aria-hidden="true"
            focusable="false"
            data-prefix="fas"
            data-icon="search"
            role="img"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 512 512"
            class="svg-inline--fa fa-search fa-w-16"
          >
            <path
              data-v-390ceb07=""
              fill="currentColor"
              d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z"
              class=""
            >
            </path>
          </svg>
        </button>
      </div>
    </div>
</section>
</div>

<div class="flex img-wrapper">
  <div class="search-status">
    <h1 class="search_results"></h1>
    <div class="spinner hidden">
      <svg viewBox="0 0 512 512">
        <path
          fill="currentColor"
          d="M304 48c0 26.51-21.49 48-48 48s-48-21.49-48-48
          21.49-48 48-48 48 21.49 48 48z"
        />
      </svg>
    </div>
  </div>
  <img
    src="./assets/undraw_websites.svg"
    class="building"
    alt="landing page image"
  />
</div>

<div class="movie-container flex flex-1" id="movie-container">
  <div class="movie-container__spinner hidden" id="movie-container-spinner" aria-hidden="true">
    <svg viewBox="0 0 512 512">
      <path
        fill="currentColor"
        d="M304 48c0 26.51-21.49 48-48 48s-48-21.49-48-48
        21.49-48 48-48 48 21.49 48 48z"
      />
    </svg>
  </div>
  <div class="movie-controls hidden">
    <label for="sort-select">Sort by:</label>
    <select id="sort-select" class="sort-select">
      <option value="title-asc">Alphabetical A to Z</option>
      <option value="title-desc">Alphabetical Z to A</option>
      <option value="year-desc">Newest to oldest </option>
      <option value="year-asc">Oldest to newest </option>
    </select>
  </div>
  <div class="movie-list">
    <div class="movie">
      <!---<div class="movie-card">
            <div class="movie-card__container">
              <h3 class="movie-name">Movie Name</h3>
                <p class="movie-poster"> <img src="" ></p>
                <p class="movie-year"><b>Year:</b> 2020</p>
                <p class="movie-id"><b>imdbID:</b> 0000000000</p>
                <p class="movie-type"><b>Type:</b> Movie</p>
            </div>
          </div>--->
    </div>
  </div>
</div>

 <footer>
      <div class="row footer__row">
        <a href="#" class="footer__anchor">
          <figure class="footer__logo">
            <img src="./assets/blinker-logo.png" class="footer__logo--img" alt="" />
          </figure>
          <span class="footer__logo--popper">
            Top <i class="fas fa-arrow-up"></i
          ></span>
        </a>
        <div class="footer__social--list">
          <a
            href="#"
            class="footer__social--link link__hover-effect link__hover-effect--white"
            target="_blank"
            >Career</a
          >
          <a
            href="https://www.linkedin.com/in/spowar/"
            class="footer__social--link link__hover-effect link__hover-effect--white"
            target="_blank"
            >LinkedIn</a
          >
          <a
            href="mailto:blinker@gmail.com"
            class="footer__social--link link__hover-effect link__hover-effect--white"
            target="_blank"
            >Email</a
          >
          <a
            href="#"
            class="footer__social--link link__hover-effect link__hover-effect--white"
            target="_blank"
            download
            >Contact</a
          >
        </div>
        <div class="footer__copyright">Copyright &copy; Blinker</div>
      </div>
    </footer>
</body>
<script src="index.js"></script>
</html>
